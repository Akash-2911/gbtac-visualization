# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
name: Build and deploy Node.js app to Azure Web App - app-gbtac-dev
on:
  push:
    branches:
      - Dev
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
      - name: npm install, build, and test
        working-directory: ./frontend
        env:
          REACT_APP_API_BASE_URL: https://func-gbtac-dev1-g8d8c2c6e6crc2ag.canadacentral-01.azurewebsites.net/api
          REACT_APP_AAD_CLIENT_ID: 1dbd7a4a-eb19-4757-9785-ba98bd0d45b9
          REACT_APP_AAD_TENANT_ID: cbe66312-1468-4ec8-9cda-aec4905862fe
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present -- --watchAll=false --passWithNoTests
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./frontend/build
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_89EF0A6194B1410B86667AC85F626BB5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_45AEE3EE69344A469EE91E16F8A9E2E3 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6DE37C36C817457392AD85C88E5D35C5 }}
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-gbtac-dev'
          slot-name: 'Production'
          package: .
